name: Feature request
description: Suggest an improvement or new capability
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Before you submit
      options:
        - label: I checked [Discussions](https://github.com/stack-found/vazen/discussions) for prior conversation on this idea
          required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - apps/web
        - apps/docs
        - packages (shared)
        - tooling / CI
        - Other / unsure
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, related issues.

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting, you agree to follow our [Code of Conduct](https://github.com/stack-found/vazen/blob/main/.github/CODE_OF_CONDUCT.md).
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
