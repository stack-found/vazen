packages:
  - "apps/*"
  - "packages/*"
  - "tooling/*"
  - "e2e/*"

allowBuilds:
  "@sentry/cli": true
  core-js: true
  esbuild: true
  fallow: true
  lefthook: true
  protobufjs: true
  sharp: true

catalog:
