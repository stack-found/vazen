  "@sentry/nextjs": 10.53.1
  "@t3-oss/env-nextjs": ^0.13.11
  "@tailwindcss/postcss": ^4.3.0
  "@types/node": ^24.12.4
  drizzle-orm: 0.45.2
  motion: ^12.40.0
  "server-only": 0.0.1
  tailwindcss: ^4.3.0
  typescript: ^5.9.3
  zod: 4.4.3
catalogs:
  auth:
    "@better-auth/infra": 0.2.10
    better-auth: 1.6.11
  next:
    "@next/bundle-analyzer": 16.2.6
    next: 16.2.6
  orpc:
    "@orpc/client": 1.14.3
    "@orpc/server": 1.14.3
    "@orpc/tanstack-query": 1.14.3
  react:
    "@types/react": 19.2.15
    "@types/react-dom": 19.2.3
    react: 19.2.6
    "react-dom": 19.2.6
  tanstack:
    "@tanstack/react-query": ^5.100.14
