  "@sentry/nextjs": 10.51.0
  "@t3-oss/env-nextjs": ^0.13.11
  "@tailwindcss/postcss": ^4.3.0
  "@types/node": ^24.12.3
  drizzle-orm: 0.45.2
  "server-only": 0.0.1
  tailwindcss: ^4.3.0
  typescript: ^5.9.3
  zod: 4.4.3
  motion: ^12.38.0
catalogs:
  auth:
    "@better-auth/infra": 0.2.6
    better-auth: 1.6.9
  next:
    next: 16.2.6
  orpc:
    "@orpc/client": 1.14.2
    "@orpc/server": 1.14.2
    "@orpc/tanstack-query": 1.14.2
  react:
    "@types/react": 19.2.14
    "@types/react-dom": 19.2.3
    react: 19.2.6
    "react-dom": 19.2.6
  tanstack:
    "@tanstack/react-query": ^5.100.9
    "@tanstack/react-query-devtools": ^5.100.9
