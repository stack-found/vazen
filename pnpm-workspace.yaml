  "@sentry/nextjs": 10.56.0
  "@t3-oss/env-nextjs": ^0.13.11
  "@tailwindcss/postcss": ^4.3.1
  "@types/node": ^24.13.2
  drizzle-orm: 0.45.2
  motion: ^12.40.0
  "server-only": 0.0.1
  tailwindcss: ^4.3.1
  typescript: ^5.9.3
  zod: 4.4.3
catalogs:
  auth:
    "@better-auth/infra": 0.3.4
    better-auth: 1.6.22
  next:
    "@next/bundle-analyzer": 16.2.9
    next: 16.2.9
  orpc:
    "@orpc/client": 1.14.6
    "@orpc/server": 1.14.6
    "@orpc/tanstack-query": 1.14.6
  react:
    "@types/react": 19.2.17
    "@types/react-dom": 19.2.3
