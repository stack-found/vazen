commit-msg:
  commands:
    lint:commitlint:
      run: pnpm commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    format:oxfmt:
      glob: "*.{ts,tsx,js,jsx,json,jsonc,css}"
      run: "pnpm oxfmt --write {staged_files}"
      stage_fixed: true
    lint:oxlint:
      glob: "*.{js,jsx,ts,tsx}"
      run: "pnpm lint -- --fix {staged_files}"
      stage_fixed: true
    deps:renovate:
      glob: "renovate.json|.github/renovate.json"
      run: npx --yes --package renovate -- renovate-config-validator --strict {staged_files}
      stage_fixed: true
